# Configuración para detección de cáncer de pulmón

data:
  train_path: "data/processed/lung_cancer_train.npy"
  val_path: "data/processed/lung_cancer_val.npy"
  test_path: "data/processed/lung_cancer_test.npy"

model:
  type: "transformer"
  n_sensors: 8
  signal_length: 1000
  n_classes: 2

training:
  batch_size: 16
  epochs: 150
  learning_rate: 0.0005
  weight_decay: 0.0001

class_names:
  - "Sano"
  - "Cáncer de Pulmón"

disease_info:
  name: "Cáncer de Pulmón"
  biomarker: "Benceno y otros COVs"
  expected_accuracy: "hasta 90% sensibilidad"
  detection_method: "Análisis de aliento"
