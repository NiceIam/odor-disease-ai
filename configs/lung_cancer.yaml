# Configuration for lung cancer detection

data:
  train_path: "data/processed/lung_cancer_train.npy"
  val_path: "data/processed/lung_cancer_val.npy"
  test_path: "data/processed/lung_cancer_test.npy"

model:
  type: "transformer"
  n_sensors: 8
  signal_length: 1000
  n_classes: 2

training:
  batch_size: 16
  epochs: 150
  learning_rate: 0.0005
  weight_decay: 0.0001

class_names:
  - "Healthy"
  - "Lung Cancer"

disease_info:
  name: "Lung Cancer"
  biomarker: "Benzene and other VOCs"
  expected_accuracy: "up to 90% sensitivity"
  detection_method: "Breath analysis"
