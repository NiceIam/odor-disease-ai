# Configuración para detección de diabetes tipo 2 por aliento

data:
  train_path: "data/processed/diabetes_train.npy"
  val_path: "data/processed/diabetes_val.npy"
  test_path: "data/processed/diabetes_test.npy"

model:
  type: "cnn1d"  # opciones: cnn1d, rescnn1d, transformer
  n_sensors: 8
  signal_length: 1000
  n_classes: 2  # Sano vs Diabetes

training:
  batch_size: 32
  epochs: 100
  learning_rate: 0.001
  weight_decay: 0.0001

class_names:
  - "Sano"
  - "Diabetes Tipo 2"

disease_info:
  name: "Diabetes Tipo 2"
  biomarker: "Acetona en aliento"
  expected_accuracy: "85-92%"
  detection_method: "Análisis de compuestos orgánicos volátiles (COVs)"
