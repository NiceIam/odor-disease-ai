# Configuration for type 2 diabetes detection by breath

data:
  train_path: "data/processed/diabetes_train.npy"
  val_path: "data/processed/diabetes_val.npy"
  test_path: "data/processed/diabetes_test.npy"

model:
  type: "cnn1d"  # options: cnn1d, rescnn1d, transformer
  n_sensors: 8
  signal_length: 1000
  n_classes: 2  # Healthy vs Diabetes

training:
  batch_size: 32
  epochs: 100
  learning_rate: 0.001
  weight_decay: 0.0001

class_names:
  - "Healthy"
  - "Type 2 Diabetes"

disease_info:
  name: "Type 2 Diabetes"
  biomarker: "Acetone in breath"
  expected_accuracy: "85-92%"
  detection_method: "Volatile organic compound (VOC) analysis"
